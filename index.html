<style>
:root {
  --bg: #f6f4ef; --card: #ffffff; --text: #1e2126; --muted: #6b7280;
  --border: #e5e1d8; --accent: #0f6f5c; --accent-text: #ffffff;
  --pill-hi: #dcefe4; --pill-hi-t: #14532d; --pill-mid: #fdf0d5; --pill-mid-t: #92400e;
  --pill-lo: #fde2e2; --pill-lo-t: #991b1b; --pill-na: #ececec; --pill-na-t: #6b7280;
  --chip: #eef2f7; --chip-t: #374151; --danger: #b91c1c;
  --st-applied: #dbeafe; --st-applied-t: #1d4ed8;
  --st-interviewing: #ede9fe; --st-interviewing-t: #6d28d9;
  --st-offer: #dcfce7; --st-offer-t: #15803d;
  --st-rejected: #f3f4f6; --st-rejected-t: #6b7280;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14161a; --card: #1e2127; --text: #e8e6e1; --muted: #9aa1ab;
    --border: #2c3038; --accent: #2fbf9b; --accent-text: #0b0d10;
    --pill-hi: #143526; --pill-hi-t: #7fd8a8; --pill-mid: #3a2c12; --pill-mid-t: #f0b862;
    --pill-lo: #3a1a1a; --pill-lo-t: #f08a8a; --pill-na: #2a2d33; --pill-na-t: #9aa1ab;
    --chip: #262a31; --chip-t: #c3c9d1; --danger: #f08a8a;
    --st-applied: #172a54; --st-applied-t: #8ab4ff;
    --st-interviewing: #2a1f4d; --st-interviewing-t: #c4b5fd;
    --st-offer: #14351f; --st-offer-t: #86efac;
    --st-rejected: #26292e; --st-rejected-t: #9aa1ab;
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text);
  font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
header { padding: 22px 24px 8px; max-width: 1280px; margin: 0 auto; }
h1 { margin: 0 0 2px; font-size: 24px; display: flex; align-items: center; gap: 10px; }
h1 svg { width: 30px; height: 30px; flex: none; }
.sub { color: var(--muted); font-size: 13px; }
.pipeline { display: flex; flex-wrap: wrap; gap: 8px; max-width: 1280px;
  margin: 12px auto 0; padding: 0 24px; }
.stagechip { border: 1px solid var(--border); background: var(--card);
  border-radius: 999px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: var(--text); }
.stagechip.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.stagechip b { font-weight: 700; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  max-width: 1280px; margin: 12px auto 0; padding: 0 24px; }
.controls input[type=search], .controls select {
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 10px; font-size: 13.5px; }
.controls input[type=search] { flex: 1 1 220px; min-width: 170px; }
.controls label { font-size: 13px; color: var(--muted); display: flex;
  align-items: center; gap: 5px; white-space: nowrap; }
#count { margin-left: auto; font-size: 13px; color: var(--muted); }
main { max-width: 1280px; margin: 16px auto 60px; padding: 0 24px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card { background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 18px 14px; display: flex;
  flex-direction: column; gap: 8px; }
.card.dead { opacity: .6; }
.card h2 { margin: 0; font-size: 16.5px; line-height: 1.35; }
.company { font-weight: 600; font-size: 14px; }
.meta { color: var(--muted); font-size: 13px; }
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill, .chip { border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
.pill.hi  { background: var(--pill-hi);  color: var(--pill-hi-t); }
.pill.mid { background: var(--pill-mid); color: var(--pill-mid-t); }
.pill.lo  { background: var(--pill-lo);  color: var(--pill-lo-t); }
.pill.na  { background: var(--pill-na);  color: var(--pill-na-t); font-weight: 500; }
.chip { background: var(--chip); color: var(--chip-t); font-weight: 500; }
.chip.warn { color: var(--danger); font-weight: 600; }
.statusbadge { border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
.st-applied      { background: var(--st-applied);      color: var(--st-applied-t); }
.st-interviewing { background: var(--st-interviewing); color: var(--st-interviewing-t); }
.st-offer        { background: var(--st-offer);        color: var(--st-offer-t); }
.st-rejected     { background: var(--st-rejected);     color: var(--st-rejected-t); }
.reason { font-size: 13px; color: var(--muted); font-style: italic;
  border-left: 3px solid var(--border); padding-left: 10px; margin: 2px 0; white-space: pre-line; }
.desc { font-size: 13.5px; color: var(--muted); overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
.desc.open { display: block; -webkit-line-clamp: unset; }
.more { background: none; border: none; color: var(--accent); cursor: pointer;
  font-size: 13px; padding: 0; text-align: left; width: fit-content; }
.foot { margin-top: auto; display: flex; align-items: center; gap: 10px; padding-top: 6px; }
.apply { background: var(--accent); color: var(--accent-text); text-decoration: none;
  font-weight: 600; font-size: 14px; border-radius: 10px; padding: 8px 18px; }
.apply:hover { filter: brightness(1.08); }
.salary { font-size: 13px; font-weight: 600; }
.track { display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px dashed var(--border);
  padding-top: 10px; margin-top: 2px; }
.track button { background: var(--chip); color: var(--chip-t); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.track button:hover { border-color: var(--accent); }
.track button.on-applied      { background: var(--st-applied);      color: var(--st-applied-t);      font-weight: 700; }
.track button.on-interviewing { background: var(--st-interviewing); color: var(--st-interviewing-t); font-weight: 700; }
.track button.on-offer        { background: var(--st-offer);        color: var(--st-offer-t);        font-weight: 700; }
.track button.on-rejected     { background: var(--st-rejected);     color: var(--st-rejected-t);     font-weight: 700; }
.empty { grid-column: 1 / -1; text-align: center; color: var(--muted); padding: 60px 0; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); border-radius: 10px; padding: 10px 18px;
  font-size: 13.5px; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90vw; }
#toast.show { opacity: .95; }
</style>

      citySel = document.getElementById('city'), modeSel = document.getElementById('mode'),
      whenSel = document.getElementById('when'), minSel = document.getElementById('minscore'),
      hasSalary = document.getElementById('hassalary'), hideFlag = document.getElementById('hideflag'),
      count = document.getElementById('count'), pipeline = document.getElementById('pipeline'),
      toast = document.getElementById('toast');
let stageFilter = 'active';

[...new Set(JOBS.map(j => j.source))].sort().forEach(s => {
  const o = document.createElement('option'); o.value = s; o.textContent = s; srcSel.appendChild(o);
});
[...new Set(JOBS.map(j => j.city))].sort().forEach(c => {
  const o = document.createElement('option'); o.value = c; o.textContent = c; citySel.appendChild(o);
});

function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

async function setStatus(job, status) {
  const newStatus = job.app_status === status ? null : status;
  try {
    const resp = await fetch(SERVER + '/track', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id: job.id, status: newStatus}),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    job.app_status = newStatus;
    render();
    showToast(newStatus ? `Marked ${newStatus}: ${job.company}` : `Back to active: ${job.company}`);
  } catch (e) {
    showToast('⚠ Board server not running — start it with: python main.py serve');
  }
}

function pillClass(v) { return v == null ? 'na' : v >= 70 ? 'hi' : v >= 45 ? 'mid' : 'lo'; }

function daysAgo(dateStr) {
  if (!dateStr) return 999;
  return Math.floor((Date.now() - new Date(dateStr + 'T00:00:00')) / 86400000);
}

function renderPipeline() {
  if (PUBLIC) { pipeline.style.display = 'none'; return; }
  const counts = {active: 0, applied: 0, interviewing: 0, offer: 0, rejected: 0};
  JOBS.forEach(j => counts[j.app_status || 'active']++);
  pipeline.replaceChildren(...['active', ...STATUSES, 'all'].map(st => {
    const b = document.createElement('button');
    b.className = 'stagechip' + (stageFilter === st ? ' active' : '');
    const label = st[0].toUpperCase() + st.slice(1);
    b.innerHTML = st === 'all' ? '<b>All</b>' : `${label} <b>${counts[st]}</b>`;
    b.onclick = () => { stageFilter = st; render(); };
    return b;
  }));
}

function card(j) {
  const c = document.createElement('article'); c.className = 'card' + (j.link_dead ? ' dead' : '');
  const h = document.createElement('h2'); h.textContent = j.title; c.appendChild(h);
  const comp = document.createElement('div'); comp.className = 'company';
  comp.textContent = j.company; c.appendChild(comp);
  const meta = document.createElement('div'); meta.className = 'meta';
  meta.textContent = [j.location, j.work_mode, j.posted_date ? 'posted ' + j.posted_date : '',
                      j.experience_hint ? 'exp: ' + j.experience_hint : ''].filter(Boolean).join(' · ');
  c.appendChild(meta);
  const pills = document.createElement('div'); pills.className = 'pills';
  if (j.app_status) {
    const s = document.createElement('span'); s.className = 'statusbadge st-' + j.app_status;
    s.textContent = j.app_status.toUpperCase(); pills.appendChild(s);
  }
  if (PUBLIC) {
    // no score pills on the public snapshot
  } else if (j.blended_score != null) {
    for (const [label, v] of [['match ' + j.blended_score, j.blended_score],
                              ['fit ' + j.fit_score, j.fit_score],
                              ['response ' + j.response_score, j.response_score]]) {
      const p = document.createElement('span'); p.className = 'pill ' + pillClass(v);
      p.textContent = label; pills.appendChild(p);
    }
  } else {
    const p = document.createElement('span'); p.className = 'pill na';
    p.textContent = 'not scored yet'; pills.appendChild(p);
  }
  const chip = document.createElement('span'); chip.className = 'chip';
  chip.textContent = j.via ? j.source + ' · ' + j.via : j.source; pills.appendChild(chip);
  if (j.link_dead) { const d = document.createElement('span'); d.className = 'chip warn';
    d.textContent = '✗ posting may be closed'; pills.appendChild(d); }
  if (j.flagged) { const f = document.createElement('span'); f.className = 'chip';
    f.textContent = '⚠ check location'; pills.appendChild(f); }
  c.appendChild(pills);
  if (j.reasoning) { const r = document.createElement('div'); r.className = 'reason';
    r.textContent = j.reasoning; c.appendChild(r); }
  if (j.description) {
    const d = document.createElement('div'); d.className = 'desc';
    d.textContent = j.description; c.appendChild(d);
    const m = document.createElement('button'); m.className = 'more'; m.textContent = 'Show more';
    m.onclick = () => { d.classList.toggle('open');
      m.textContent = d.classList.contains('open') ? 'Show less' : 'Show more'; };
    c.appendChild(m);
  }
  const foot = document.createElement('div'); foot.className = 'foot';
  const a = document.createElement('a'); a.className = 'apply'; a.href = j.url;
  a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Apply ↗'; foot.appendChild(a);
  if (j.salary) { const s = document.createElement('span'); s.className = 'salary';
    s.textContent = j.salary; foot.appendChild(s); }
  c.appendChild(foot);
  if (PUBLIC) return c;
  const track = document.createElement('div'); track.className = 'track';
  STATUSES.forEach(st => {
    const b = document.createElement('button');
    b.textContent = st === j.app_status ? '✓ ' + st : st;
    if (st === j.app_status) b.className = 'on-' + st;
    b.onclick = () => setStatus(j, st);
    track.appendChild(b);
  });
  c.appendChild(track);
  return c;
}

if (PUBLIC) {
  // scores are private: hide the min-match filter, reduce sort options
  minSel.style.display = 'none';
  sortSel.replaceChildren(...[['rank', 'Ranked (best first)'], ['date', 'Newest first']]
    .map(([v, t]) => { const o = document.createElement('option'); o.value = v; o.textContent = t; return o; }));
}

function render() {
  renderPipeline();
  const term = q.value.trim().toLowerCase(), src = srcSel.value, sort = sortSel.value;
  let rows = JOBS.filter(j =>
    (stageFilter === 'all' || (j.app_status || 'active') === stageFilter) &&
    (!src || j.source === src) &&
    (!citySel.value || j.city === citySel.value) &&
    (!modeSel.value || j.work_mode === modeSel.value) &&
    (!whenSel.value || daysAgo(j.posted_date) < parseInt(whenSel.value)) &&
    (!minSel.value || (j.blended_score ?? -1) >= parseInt(minSel.value)) &&
    (!hasSalary.checked || j.salary) &&
    (!hideFlag.checked || !j.flagged) &&
    (!term || (j.title + ' ' + j.company + ' ' + (j.description || '') + ' ' + (j.location || ''))
      .toLowerCase().includes(term)));
  const key = {score: 'blended_score', fit: 'fit_score', response: 'response_score'}[sort];
  if (sort === 'date') {
    rows.sort((a, b) => (b.posted_date || '').localeCompare(a.posted_date || ''));
  } else if (key) {
    rows.sort((a, b) => (b[key] ?? -1) - (a[key] ?? -1) ||
                        (b.posted_date || '').localeCompare(a.posted_date || ''));
  } // sort === 'rank' (public): keep server order — already best-first
  grid.replaceChildren(...rows.map(card));
  if (!rows.length) { const e = document.createElement('div'); e.className = 'empty';
    e.textContent = 'No jobs match these filters.'; grid.appendChild(e); }
  count.textContent = rows.length + ' of ' + JOBS.length + ' jobs';
}
[q, srcSel, sortSel, citySel, modeSel, whenSel, minSel, hasSalary, hideFlag]
  .forEach(el => el.addEventListener('input', render));
render();
</script>
</body>
</html>
